services:
  # --- qortex application ---
  # The qortex server with the embedding model baked into the image.
  # Start with: docker compose up -d qortex
  qortex:
    image: ghcr.io/peleke/qortex:latest
    container_name: qortex
    ports:
      - "8400:8400"   # REST API
      - "8401:8401"   # MCP Streamable HTTP
    environment:
      QORTEX_STORE: ${QORTEX_STORE:-postgres}
      DATABASE_URL: postgresql://qortex:qortex@postgres:5432/qortex
      QORTEX_GRAPH: ${QORTEX_GRAPH:-memgraph}
      MEMGRAPH_HOST: memgraph
      MEMGRAPH_PORT: "7687"
      MEMGRAPH_USER: ${MEMGRAPH_USER:-memgraph}
      MEMGRAPH_PASSWORD: ${MEMGRAPH_PASSWORD:-memgraph}
      QORTEX_EXTRACTION: ${QORTEX_EXTRACTION:-spacy}
      QORTEX_OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      QORTEX_PROMETHEUS_ENABLED: "true"
      QORTEX_PROMETHEUS_PORT: "9464"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Memgraph + Lab: only needed for local-only dev (no sandbox).
  # When using the sandbox, Lima auto-forwards these ports from the VM.
  # Start with: docker compose --profile local-graph up -d
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: qortex-memgraph
    profiles: ["local-graph"]
    ports:
      - "7687:7687"  # Bolt protocol
      - "7444:7444"  # Monitoring
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
    environment:
      - MEMGRAPH_USER=${MEMGRAPH_USER:-memgraph}
      - MEMGRAPH_PASSWORD=${MEMGRAPH_PASSWORD:-memgraph}
    command: ["--also-log-to-stderr"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',7687)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: qortex-lab
    profiles: ["local-graph"]
    ports:
      - "3000:3000"
    depends_on:
      memgraph:
        condition: service_healthy
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
      - QUICK_CONNECT_MG_IS_ENCRYPTED=false

  # --- Postgres (pgvector) ---
  postgres:
    image: pgvector/pgvector:pg17
    container_name: qortex-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qortex
      POSTGRES_PASSWORD: qortex
      POSTGRES_DB: qortex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qortex"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # --- Observability Stack ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: qortex-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC (sandbox/host pushes here)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics (collector exposes for scraping)
    volumes:
      - ./otel-collector/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.7.2
    container_name: qortex-tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (query frontend)
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]

  prometheus:
    image: prom/prometheus:latest
    container_name: qortex-prometheus
    ports:
      - "9091:9090"   # Prometheus UI (9091 to avoid conflict with app metrics port)
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  victorialogs:
    image: victoriametrics/victoria-logs:latest
    container_name: qortex-victorialogs
    ports:
      - "9428:9428"  # VictoriaLogs HTTP API
    volumes:
      - victorialogs_data:/vlogs
    command:
      - "-storageDataPath=/vlogs"
      - "-retentionPeriod=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: qortex-grafana
    ports:
      - "3010:3000"   # Grafana UI (3010 to avoid conflict with Memgraph Lab)
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-qortex}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=victoriametrics-logs-datasource,jdbranham-diagram-panel,grafana-tempo-datasource
    depends_on:
      - prometheus
      - victorialogs
      - tempo

volumes:
  postgres_data:
  memgraph_data:
  memgraph_log:
  prometheus_data:
  victorialogs_data:
  grafana_data:
  tempo_data:
