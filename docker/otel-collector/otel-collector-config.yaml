# OpenTelemetry Collector config: receives OTLP, routes traces to Tempo,
# exports metrics for Prometheus scraping.
#
# This enables push-based observability from remote environments (e.g. sandbox)
# while keeping the existing Grafana dashboard working unchanged.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

connectors:
  servicegraph:
    latency_histogram_buckets: [10ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    dimensions:
      - service.namespace
    store:
      ttl: 2s
      max_items: 1000

processors:
  batch:
    timeout: 5s

exporters:
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/tempo, servicegraph]
    metrics:
      receivers: [otlp, servicegraph]
      processors: [batch]
      exporters: [prometheus]
