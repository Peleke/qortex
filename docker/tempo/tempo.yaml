# Grafana Tempo v2.7 config: single-binary mode for local/dev tracing.
# Receives OTLP from the otel-collector, stores traces locally.
# Query via Grafana Explore (TraceQL) at http://localhost:3200.

stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h   # 7 days

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

querier:
  max_concurrent_queries: 20
