<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" width="100%" role="graphics-document document" aria-roledescription="qortex pipeline diagram" aria-label="qortex pipeline: documents flow through ingestion into a knowledge graph, then through graph-enhanced retrieval to MCP consumers and AI agents, with a learning feedback loop">
  <style>
    .sk-box {
      fill: rgba(168,85,247,0.08);
      stroke: #e0e0e0;
      stroke-width: 1.2;
    }
    .sk-box-accent {
      fill: rgba(168,85,247,0.08);
      stroke: rgb(168,85,247);
      stroke-width: 1.5;
      filter: url(#sk-glow);
    }
    .sk-label {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 9px;
      fill: #888888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .sk-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      fill: #e0e0e0;
    }
    .sk-subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 10px;
      fill: #888888;
    }
    .sk-flow {
      stroke: #e0e0e0;
      stroke-width: 1.2;
      fill: none;
      stroke-dasharray: 6 4;
      opacity: 0.55;
    }
    .sk-flow-anim {
      animation: sk-dash 2.5s linear infinite;
    }
    @keyframes sk-dash { to { stroke-dashoffset: -20; } }
    .sk-flow-solid {
      stroke: #e0e0e0;
      stroke-width: 1.2;
      fill: none;
      opacity: 0.55;
    }
    .sk-arrow {
      fill: #e0e0e0;
      opacity: 0.55;
    }
    .sk-feedback {
      stroke: rgb(168,85,247);
      stroke-width: 1.3;
      fill: none;
      stroke-dasharray: 5 3;
      opacity: 0.5;
    }
    .sk-feedback-anim {
      animation: sk-fb 3s linear infinite;
    }
    @keyframes sk-fb { to { stroke-dashoffset: -16; } }
    .sk-fb-arrow {
      fill: rgb(168,85,247);
      opacity: 0.5;
    }
    .sk-fb-label {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 8px;
      fill: rgb(168,85,247);
      opacity: 0.7;
    }
    .sk-cylinder-body {
      fill: rgba(168,85,247,0.08);
      stroke: rgb(168,85,247);
      stroke-width: 1.5;
    }
    .sk-cylinder-top {
      fill: rgba(168,85,247,0.12);
      stroke: rgb(168,85,247);
      stroke-width: 1.5;
    }
  </style>

  <defs>
    <filter id="sk-glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sketchy jitter filter -->
    <filter id="sk-jitter" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" seed="7" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ============================== -->
  <!-- ROW 1: Main pipeline (y ~140)  -->
  <!-- ============================== -->

  <!-- Box 1: Ingest (sources) -->
  <g transform="translate(30, 118) rotate(-0.3)" filter="url(#sk-jitter)">
    <rect x="0" y="0" width="130" height="56" rx="5" ry="5" class="sk-box"/>
  </g>
  <text x="46" y="137" class="sk-label">ingest</text>
  <text x="46" y="155" class="sk-title">PDF / Markdown</text>
  <text x="46" y="169" class="sk-subtitle">auto-extraction</text>

  <!-- Arrow: Ingest -> KG -->
  <line x1="164" y1="146" x2="214" y2="146" class="sk-flow sk-flow-anim"/>
  <polygon points="212,142 222,146 212,150" class="sk-arrow"/>

  <!-- Box 2: Knowledge Graph (cylinder) -->
  <g transform="translate(224, 110) rotate(0.2)" filter="url(#sk-jitter)">
    <!-- Cylinder body -->
    <rect x="0" y="12" width="140" height="52" class="sk-cylinder-body" rx="2"/>
    <!-- Cylinder top ellipse -->
    <ellipse cx="70" cy="12" rx="70" ry="12" class="sk-cylinder-top"/>
    <!-- Cylinder bottom arc -->
    <path d="M 0,64 Q 70,88 140,64" class="sk-cylinder-body" fill="none"/>
  </g>
  <text x="253" y="137" class="sk-label">knowledge graph</text>
  <text x="248" y="155" class="sk-title">Concepts + Edges</text>
  <text x="252" y="169" class="sk-subtitle">typed relationships</text>

  <!-- Arrow: KG -> Query -->
  <line x1="368" y1="146" x2="418" y2="146" class="sk-flow sk-flow-anim"/>
  <polygon points="416,142 426,146 416,150" class="sk-arrow"/>

  <!-- Box 3: Query layer (accented) -->
  <g transform="translate(428, 118) rotate(0.4)" filter="url(#sk-jitter)">
    <rect x="0" y="0" width="148" height="56" rx="5" ry="5" class="sk-box-accent"/>
  </g>
  <text x="446" y="137" class="sk-label">retrieval</text>
  <text x="442" y="155" class="sk-title">Vec + Graph PPR</text>
  <text x="442" y="169" class="sk-subtitle">combined scoring</text>

  <!-- Arrow: Query -> fan out (3 targets) -->
  <!-- Main horizontal to branch point -->
  <line x1="580" y1="146" x2="630" y2="146" class="sk-flow-solid"/>

  <!-- Branch to MCP Server (middle) -->
  <line x1="630" y1="146" x2="680" y2="146" class="sk-flow sk-flow-anim"/>
  <polygon points="678,142 688,146 678,150" class="sk-arrow"/>

  <!-- Branch to buildlog (top) -->
  <path d="M 630,146 C 640,146 650,60 670,60" class="sk-flow sk-flow-anim"/>
  <polygon points="668,56 678,60 668,64" class="sk-arrow"/>

  <!-- Branch to AI Agents (bottom) -->
  <path d="M 630,146 C 640,146 650,234 670,234" class="sk-flow sk-flow-anim"/>
  <polygon points="668,230 678,234 668,238" class="sk-arrow"/>

  <!-- ============================== -->
  <!-- ROW 0: buildlog target (y ~38) -->
  <!-- ============================== -->
  <g transform="translate(680, 34) rotate(-0.5)" filter="url(#sk-jitter)">
    <rect x="0" y="0" width="120" height="52" rx="5" ry="5" class="sk-box"/>
  </g>
  <text x="698" y="52" class="sk-label">projection</text>
  <text x="698" y="70" class="sk-title">buildlog</text>
  <text x="698" y="82" class="sk-subtitle">seeds + rules</text>

  <!-- ============================== -->
  <!-- ROW 1: MCP Server (y ~120)     -->
  <!-- ============================== -->
  <g transform="translate(690, 120) rotate(0.3)" filter="url(#sk-jitter)">
    <rect x="0" y="0" width="130" height="52" rx="5" ry="5" class="sk-box"/>
  </g>
  <text x="708" y="138" class="sk-label">server</text>
  <text x="708" y="156" class="sk-title">MCP Server</text>
  <text x="708" y="168" class="sk-subtitle">JSON-RPC tools</text>

  <!-- ============================== -->
  <!-- ROW 2: AI Agents (y ~208)      -->
  <!-- ============================== -->
  <g transform="translate(680, 208) rotate(0.6)" filter="url(#sk-jitter)">
    <rect x="0" y="0" width="130" height="52" rx="5" ry="5" class="sk-box"/>
  </g>
  <text x="698" y="226" class="sk-label">consumers</text>
  <text x="698" y="244" class="sk-title">AI Agents</text>
  <text x="698" y="256" class="sk-subtitle">Claude, Cursor, ...</text>

  <!-- ============================== -->
  <!-- FEEDBACK LOOP (Learning)       -->
  <!-- ============================== -->

  <!-- Learning box at bottom center -->
  <g transform="translate(330, 268) rotate(-0.4)" filter="url(#sk-jitter)">
    <rect x="0" y="0" width="140" height="52" rx="5" ry="5" class="sk-box-accent"/>
  </g>
  <text x="350" y="287" class="sk-label">learning</text>
  <text x="346" y="304" class="sk-title">Thompson Sampling</text>
  <text x="346" y="316" class="sk-subtitle">accept / reject signals</text>

  <!-- Feedback arrow: AI Agents -> Learning -->
  <path d="M 745,262 C 745,294 560,316 474,320" class="sk-feedback sk-feedback-anim"/>
  <polygon points="476,324 466,320 476,316" class="sk-fb-arrow"/>
  <text x="600" y="296" class="sk-fb-label">feedback</text>

  <!-- Feedback arrow: Learning -> Knowledge Graph (back up) -->
  <path d="M 370,268 C 340,220 310,192 300,180" class="sk-feedback sk-feedback-anim"/>
  <polygon points="304,182 296,172 296,184" class="sk-fb-arrow"/>
  <text x="308" y="238" class="sk-fb-label">update weights</text>

</svg>