<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg"
     aria-label="qortex v0.8.0 architecture: REST API layer, shared asyncpg pool, PostgreSQL stores, and client access patterns">
  <style>
    .svc-bg { fill: var(--color-bg, #0d1117); }
    .svc-box { fill: var(--color-bg-elevated, #161b22); stroke: var(--color-border, #30363d); stroke-width: 1; rx: 8; }
    .svc-box-accent { fill: var(--color-bg-elevated, #161b22); stroke: var(--color-accent, #6366f1); stroke-width: 1.5; rx: 8; filter: url(#svc-glow); }
    .svc-box-store { fill: var(--color-bg-elevated, #161b22); stroke: var(--color-accent-dim, #4f46e5); stroke-width: 1; rx: 6; }
    .svc-label { font-family: var(--font-mono, 'JetBrains Mono', monospace); font-size: 8px; fill: var(--color-text-faint, #64748b); text-transform: uppercase; letter-spacing: 0.05em; }
    .svc-title { font-family: var(--font-sans, system-ui, sans-serif); font-size: 13px; fill: var(--color-text, #e2e8f0); }
    .svc-subtitle { font-family: var(--font-sans, system-ui, sans-serif); font-size: 10px; fill: var(--color-text-muted, #94a3b8); }
    .svc-flow { stroke: var(--color-accent, #6366f1); stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; opacity: 0.5; }
    .svc-flow-anim { animation: svc-dash 2s linear infinite; }
    .svc-flow-rev { animation: svc-dash-rev 3s linear infinite; }
    .svc-arrow { fill: var(--color-accent, #6366f1); opacity: 0.5; }
    .svc-pool-line { stroke: var(--color-accent-dim, #4f46e5); stroke-width: 1; stroke-dasharray: 2 2; fill: none; opacity: 0.4; }
    @keyframes svc-dash { to { stroke-dashoffset: -14; } }
    @keyframes svc-dash-rev { to { stroke-dashoffset: 14; } }
    @media (prefers-reduced-motion: reduce) {
      .svc-flow-anim, .svc-flow-rev { animation: none; }
    }
  </style>
  <defs>
    <filter id="svc-glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="svc-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="var(--color-border-subtle, #1e293b)" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" class="svc-bg"/>
  <rect width="680" height="520" fill="url(#svc-grid)" opacity="0.5"/>

  <!-- Row 1: Clients (3 boxes) -->
  <g data-layer="clients">
    <!-- MCP Clients -->
    <rect x="30" y="20" width="160" height="50" class="svc-box"/>
    <text x="45" y="38" class="svc-label">mcp clients</text>
    <text x="45" y="55" class="svc-title">Claude, Cursor</text>

    <!-- HTTP Clients -->
    <rect x="220" y="20" width="200" height="50" class="svc-box"/>
    <text x="235" y="38" class="svc-label">http clients</text>
    <text x="235" y="55" class="svc-title">HttpQortexClient</text>

    <!-- Framework Adapters -->
    <rect x="450" y="20" width="200" height="50" class="svc-box"/>
    <text x="465" y="38" class="svc-label">adapters</text>
    <text x="465" y="55" class="svc-title">agno, LangChain, Mastra</text>
  </g>

  <!-- Flow: clients -> transport -->
  <line x1="110" y1="70" x2="110" y2="100" class="svc-flow svc-flow-anim"/>
  <polygon points="110,98 106,90 114,90" class="svc-arrow"/>
  <text x="120" y="89" class="svc-subtitle" opacity="0.4">JSON-RPC</text>

  <line x1="320" y1="70" x2="320" y2="100" class="svc-flow svc-flow-anim"/>
  <polygon points="320,98 316,90 324,90" class="svc-arrow"/>
  <text x="330" y="89" class="svc-subtitle" opacity="0.4">REST</text>

  <line x1="550" y1="70" x2="550" y2="100" class="svc-flow svc-flow-anim"/>
  <polygon points="550,98 546,90 554,90" class="svc-arrow"/>
  <text x="560" y="89" class="svc-subtitle" opacity="0.4">Python</text>

  <!-- Row 2: Transport layer -->
  <g data-layer="transport">
    <rect x="30" y="100" width="160" height="45" class="svc-box"/>
    <text x="45" y="118" class="svc-label">transport</text>
    <text x="45" y="133" class="svc-title">MCP Server</text>

    <rect x="220" y="100" width="200" height="45" class="svc-box"/>
    <text x="235" y="118" class="svc-label">transport</text>
    <text x="235" y="133" class="svc-title">Starlette ASGI + Auth</text>
  </g>

  <!-- Flow: transport -> service -->
  <line x1="110" y1="145" x2="340" y2="185" class="svc-flow svc-flow-anim"/>
  <line x1="320" y1="145" x2="340" y2="185" class="svc-flow svc-flow-anim"/>
  <line x1="550" y1="100" x2="400" y2="185" class="svc-flow svc-flow-anim"/>
  <polygon points="340,183 336,175 344,175" class="svc-arrow"/>

  <!-- Row 3: QortexService (highlighted) -->
  <g data-layer="service">
    <rect x="190" y="185" width="300" height="55" class="svc-box-accent"/>
    <rect x="190" y="185" width="300" height="55" rx="8" fill="none"
          stroke="var(--color-accent, #6366f1)" stroke-width="0.5" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="205" y="203" class="svc-label">service</text>
    <text x="205" y="223" class="svc-title">QortexService.async_from_env()</text>
    <text x="500" y="218" class="svc-subtitle" text-anchor="end" opacity="0.5">core</text>
  </g>

  <!-- Flow: service -> stores (3 lines) -->
  <line x1="260" y1="240" x2="130" y2="300" class="svc-flow svc-flow-anim"/>
  <polygon points="132,298 126,292 136,290" class="svc-arrow"/>

  <line x1="340" y1="240" x2="340" y2="300" class="svc-flow svc-flow-anim"/>
  <polygon points="340,298 336,290 344,290" class="svc-arrow"/>

  <line x1="420" y1="240" x2="550" y2="300" class="svc-flow svc-flow-anim"/>
  <polygon points="548,298 544,290 554,290" class="svc-arrow"/>

  <!-- Row 4: Three stores -->
  <g data-layer="stores">
    <!-- PgVectorIndex -->
    <rect x="30" y="300" width="200" height="50" class="svc-box-store"/>
    <text x="45" y="318" class="svc-label">vec store</text>
    <text x="45" y="335" class="svc-title">PgVectorIndex</text>

    <!-- PostgresLearningStore -->
    <rect x="240" y="300" width="200" height="50" class="svc-box-store"/>
    <text x="255" y="318" class="svc-label">learning store</text>
    <text x="255" y="335" class="svc-title">PostgresLearningStore</text>

    <!-- PostgresInteroceptionStore -->
    <rect x="450" y="300" width="200" height="50" class="svc-box-store"/>
    <text x="465" y="318" class="svc-label">interoception store</text>
    <text x="465" y="335" class="svc-title">PostgresInteroception</text>
  </g>

  <!-- Flow: stores -> pool -->
  <line x1="130" y1="350" x2="340" y2="395" class="svc-pool-line"/>
  <line x1="340" y1="350" x2="340" y2="395" class="svc-pool-line"/>
  <line x1="550" y1="350" x2="340" y2="395" class="svc-pool-line"/>

  <!-- Row 5: Shared Pool -->
  <g data-layer="pool">
    <rect x="220" y="395" width="240" height="45" class="svc-box"/>
    <text x="235" y="413" class="svc-label">connection pool</text>
    <text x="235" y="430" class="svc-title">Shared asyncpg Pool</text>
    <!-- database icon -->
    <ellipse cx="435" cy="410" rx="7" ry="3" fill="none" stroke="var(--color-accent, #6366f1)" stroke-width="1" opacity="0.6"/>
    <line x1="428" y1="410" x2="428" y2="425" stroke="var(--color-accent, #6366f1)" stroke-width="1" opacity="0.6"/>
    <line x1="442" y1="410" x2="442" y2="425" stroke="var(--color-accent, #6366f1)" stroke-width="1" opacity="0.6"/>
    <ellipse cx="435" cy="425" rx="7" ry="3" fill="none" stroke="var(--color-accent, #6366f1)" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Flow: pool -> PostgreSQL -->
  <line x1="340" y1="440" x2="340" y2="470" class="svc-flow svc-flow-anim"/>
  <polygon points="340,468 336,460 344,460" class="svc-arrow"/>

  <!-- Row 6: PostgreSQL -->
  <g data-layer="postgres">
    <rect x="220" y="470" width="240" height="40" class="svc-box"/>
    <text x="235" y="488" class="svc-label">database</text>
    <text x="235" y="502" class="svc-title">PostgreSQL + pgvector</text>
  </g>

  <!-- Auth annotation -->
  <text x="235" y="157" class="svc-subtitle" opacity="0.5">API Key / HMAC-SHA256 / CORS</text>

  <!-- iter_all annotation -->
  <text x="45" y="365" class="svc-subtitle" opacity="0.4">iter_all() for streaming</text>

  <!-- migrate annotation -->
  <text x="450" y="365" class="svc-subtitle" opacity="0.4">PPR factors + edge buffer</text>
</svg>
